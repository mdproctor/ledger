# Minimal H2 datasource — satisfies Hibernate ORM startup; no actual schema applied.
quarkus.datasource.db-kind=h2
quarkus.hibernate-orm.database.generation=none

# Index casehub-ledger so Hibernate discovers LedgerEntry (JOINED inheritance)
quarkus.index-dependency.ledger.group-id=io.casehub
quarkus.index-dependency.ledger.artifact-id=casehub-ledger

# Flyway disabled — compat test only checks CDI graph, not schema correctness
quarkus.flyway.migrate-at-start=false

# Ledger features all disabled — this test only verifies CDI graph integrity,
# not ledger functionality. Scheduled jobs are disabled to avoid background noise.
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=false
casehub.ledger.decision-context.enabled=false
casehub.ledger.attestations.enabled=false
casehub.ledger.trust-score.enabled=false
casehub.ledger.trust-score.incremental.enabled=false
casehub.ledger.identity.tokenisation.enabled=false

quarkus.scheduler.enabled=false
