# Test profile — H2 in-memory datasource for @QuarkusTest integration tests

# Activate the @Alternative JPA repository implementations
quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerMerkleFrontierRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorIdentityBindingRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorTrustScoreRepository

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:ledgertestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM — schema managed by Flyway
quarkus.hibernate-orm.database.generation=none

# Flyway — pick up base migrations from main resources and test-only migrations
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/ledger/migration,classpath:db/ledger/test-migration

# Ledger config — enable all features for integration tests
casehub.ledger.reactive.enabled=true
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.decision-context.enabled=true
casehub.ledger.evidence.enabled=true
casehub.ledger.attestations.enabled=true
casehub.ledger.trust-score.enabled=false

# Trust score profile (used by TrustScoreIT, TrustScoreCapabilityIT, TrustScoreDimensionIT)
# Isolated DB — prevents actor_id PK collisions with other test classes
# Scheduler disabled — tests call runComputation() directly; nightly trigger would race writes
%trust-score-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:trustscoretestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%trust-score-test.casehub.ledger.trust-score.enabled=true
%trust-score-test.quarkus.scheduler.enabled=false

# Retention test profile (used by LedgerRetentionJobIT)
# Isolated DB — prevents stale data from other test classes contaminating listAll()
%retention-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:retentiontestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%retention-test.casehub.ledger.retention.enabled=true
%retention-test.casehub.ledger.retention.operational-days=30
%retention-test.casehub.ledger.retention.archive-before-delete=true

# Pseudonymisation test profile (used by InternalActorIdentityProviderIT, LedgerErasureServiceIT, LedgerPrivacyWiringIT)
# Isolated DB — prevents token PK collisions with other test classes
%pseudonymisation-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:pseudonymisationtestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%pseudonymisation-test.casehub.ledger.identity.tokenisation.enabled=true

# Routing signals test profile — routing enabled (used by TrustScoreRoutingIT)
%routing-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:routingtestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%routing-test.casehub.ledger.trust-score.enabled=true
%routing-test.casehub.ledger.trust-score.routing-enabled=true
# Disable scheduler so TrustScoreJob does not fire concurrently with tests
%routing-test.quarkus.scheduler.enabled=false

# Routing signals disabled test profile (used by TrustScoreRoutingDisabledIT)
%routing-disabled-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:routingdisabledtestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%routing-disabled-test.casehub.ledger.trust-score.enabled=true
%routing-disabled-test.casehub.ledger.trust-score.routing-enabled=false
%routing-disabled-test.quarkus.scheduler.enabled=false

# Enricher pipeline test profile (used by LedgerEnricherPipelineIT)
# Isolated DB — prevents interference with other test profiles
%enricher-pipeline-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:enricherpipelinetestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Trust repository test profile (used by ActorTrustScoreRepositoryIT)
# Isolated DB — prevents actor_id PK collisions with other test classes
%trust-repo-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:trustrepotest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Compliance report test profile (used by LedgerComplianceReportServiceIT)
# Isolated DB — prevents actor_id collisions with other test classes
%compliance-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:compliancetestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Health check test profile (used by LedgerHealthJobIT)
# Isolated DB — prevents other test data contaminating sequence gap queries (listAll)
%health-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:healthtestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%health-test.casehub.ledger.health.enabled=true
# Disable scheduler so LedgerHealthJob does not fire concurrently with tests
%health-test.quarkus.scheduler.enabled=false

# Federation export test profile (used by TrustExportServiceIT)
# Isolated DB — prevents actor_id collisions with other test classes
# trust-score enabled so upsert paths work (no scheduler needed — direct repo writes)
%federation-export-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:federationexporttestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%federation-export-test.casehub.ledger.trust-score.enabled=true
%federation-export-test.quarkus.scheduler.enabled=false

# Federation import test profile (used by TrustImportServiceIT)
# Isolated DB + JpaTrustImportService activated as selected alternative
%federation-import-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:federationimporttestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%federation-import-test.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerMerkleFrontierRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorIdentityBindingRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorTrustScoreRepository,\
  io.casehub.ledger.runtime.service.federation.JpaTrustImportService
%federation-import-test.quarkus.scheduler.enabled=false

# Federation bootstrap test profile (used by TrustBootstrapServiceIT)
# Isolated DB + JpaTrustImportService active so seeded rows are written
%federation-bootstrap-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:federationbootstraptestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%federation-bootstrap-test.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerMerkleFrontierRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorIdentityBindingRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorTrustScoreRepository,\
  io.casehub.ledger.runtime.service.federation.JpaTrustImportService,\
  io.casehub.ledger.service.federation.TrustBootstrapServiceIT$CapturingBootstrapSource
%federation-bootstrap-test.quarkus.scheduler.enabled=false

# Trust score bootstrap integration test profile (used by TrustScoreBootstrapIT)
# Isolated DB + JpaTrustImportService active so bootstrapped rows are written
%trust-score-bootstrap-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:trustscorebootstraptestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%trust-score-bootstrap-test.casehub.ledger.trust-score.enabled=true
%trust-score-bootstrap-test.casehub.ledger.trust-score.bootstrap.enabled=true
%trust-score-bootstrap-test.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerMerkleFrontierRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorIdentityBindingRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorTrustScoreRepository,\
  io.casehub.ledger.runtime.service.federation.JpaTrustImportService,\
  io.casehub.ledger.service.TrustScoreBootstrapIT$SeedingBootstrapSource
%trust-score-bootstrap-test.quarkus.scheduler.enabled=false

# Identity binding test profile (used by ActorIdentityBindingEntryIT)
# Isolated DB — binding entries survive REQUIRES_NEW commits and accumulate
%identity-binding-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:identitybindingtestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Identity enforcement test profile (used by LedgerIdentityEnforcementIT)
# ENFORCE mode — non-VALID identity bindings block writes
%identity-enforce-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:identityenforcetestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%identity-enforce-test.casehub.ledger.agent-identity.validation-mode=ENFORCE

# SCIM ActorDIDProvider CDI integration test profile (used by ScimActorDIDProviderIT)
# Isolated DB — prevents interference with other test classes.
# ScimActorDIDProvider selected as @Alternative so ActorDIDProvider delegates to SCIM.
# SCIM endpoint and require-https are injected at runtime by ScimWireMockResource.
%scim-did-provider-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:scimdidprovidertestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%scim-did-provider-test.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerMerkleFrontierRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorIdentityBindingRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorTrustScoreRepository,\
  io.casehub.platform.identity.ScimActorDIDProvider
%scim-did-provider-test.casehub.identity.scim.auth-token=test-token
%scim-did-provider-test.casehub.identity.scim.cache-ttl-minutes=60

# Outcome recorder test profile — trust scoring enabled, default attestor configured
# Isolated DB prevents PK collisions with TrustScoreIT and other tests
%outcome-recorder-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:outcomerecordertestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%outcome-recorder-test.casehub.ledger.trust-score.enabled=true
%outcome-recorder-test.casehub.ledger.hash-chain.enabled=false
%outcome-recorder-test.casehub.ledger.outcome.default-attestor-id=quarkmind:game-engine@v1
%outcome-recorder-test.casehub.ledger.outcome.default-attestor-type=SYSTEM
%outcome-recorder-test.quarkus.scheduler.enabled=false

# No-attestor profile — for testing the unconfigured attestor error path
# default-attestor-id intentionally absent
%outcome-no-attestor-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:outcomenoattestortestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%outcome-no-attestor-test.casehub.ledger.trust-score.enabled=true
%outcome-no-attestor-test.casehub.ledger.hash-chain.enabled=false
%outcome-no-attestor-test.quarkus.scheduler.enabled=false

# Sequence number test profile (used by JpaSequenceNumberIT)
%sequence-number-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:sequencenumbertestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Pipeline ordering test profile (used by PipelineOrderingIT)
# Isolated DB — verifies enrichment runs before digest computation
%pipeline-ordering-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:pipelineorderingtestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Find events by actor test profile (used by FindEventsByActorIdIT)
%find-events-actor-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:findeventsactortestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Incremental trust recomputation test profile (used by IncrementalTrustUpdateIT)
%incremental-trust-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:incrementaltrusttestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%incremental-trust-test.casehub.ledger.trust-score.enabled=true
%incremental-trust-test.casehub.ledger.trust-score.incremental.enabled=true
%incremental-trust-test.casehub.ledger.hash-chain.enabled=false
%incremental-trust-test.quarkus.scheduler.enabled=false

# Merkle frontier tenancy test profile (used by MerkleFrontierTenancyIT)
# Isolated DB — verifies that two tenants sharing a nameUUID-derived subjectId
# maintain independent Merkle frontiers and sequence counters.
# All four @Alternative JPA repositories are active via the default selected-alternatives
# block (JpaLedgerEntryRepository, JpaLedgerMerkleFrontierRepository,
# JpaActorIdentityBindingRepository, JpaActorTrustScoreRepository).
# Hash chain enabled (default) so frontier is written during save().
%merkle-tenancy-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:merkletenancytestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# No-op repository test profile (used by NoOpActorIdentityBindingRepositoryIT)
# Isolated DB — verifies NoOpActorIdentityBindingRepository @DefaultBean is active and
# prevents DB writes from ActorIdentityBindingObserver.
# JpaActorIdentityBindingRepository is deliberately absent from selected-alternatives;
# the @DefaultBean no-op fills the default slot.
# Profiles without their own selected-alternatives (identity-binding-test, identity-enforce-test,
# etc.) inherit the default block and pick up JpaActorIdentityBindingRepository automatically.
%noop-test.quarkus.datasource.jdbc.url=jdbc:h2:mem:nooptestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%noop-test.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerMerkleFrontierRepository
